<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NanyaYuk - Indonesian AI Learning Assistant">
    <title>NanyaYuk - Asisten AI Pembelajaran Indonesia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #fff; }
        .container { text-align: center; padding: 40px; max-width: 600px; }
        h1 { font-size: 3.5em; margin-bottom: 20px; background: linear-gradient(135deg, #7C3AED, #06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeInDown 0.8s ease-out; }
        .emoji { font-size: 1.5em; display: inline-block; margin-left: 10px; animation: bounce 1s infinite; }
        .subtitle { font-size: 1.3em; color: #aaa; margin-bottom: 40px; animation: fadeInUp 0.8s ease-out 0.2s both; }
        .loading { display: flex; justify-content: center; gap: 8px; margin: 40px 0; }
        .loading-dot { width: 12px; height: 12px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #06B6D4); animation: pulse 1.4s infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        .status { color: #06B6D4; margin-top: 40px; font-size: 1.1em; animation: fadeInUp 0.8s ease-out 0.4s both; }
        .manual-link { margin-top: 60px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); animation: fadeInUp 0.8s ease-out 0.6s both; }
        .manual-link p { color: #999; margin-bottom: 15px; font-size: 0.95em; }
        a { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #7C3AED, #06B6D4); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 15px rgba(124,58,237,0.4); }
        a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.6); }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
        @media (max-width: 600px) { h1 { font-size: 2.5em; } .subtitle { font-size: 1.1em; } .container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">

        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
        <p class="status">Memuat aplikasi...</p>
        <div class="manual-link">
            <p>Jika tidak otomatis redirect, klik tombol di bawah:</p>
            <a href="https://bolt.new/~/sb1-w7hmjguc" target="_blank">Buka NanyaYuk \u{2192}</a>
        </div>
    </div>
    <script>
        setTimeout(function() { window.location.href = 'https://bolt.new/~/sb1-w7hmjguc'; }, 2000);
    </script>
</body>
</html>
